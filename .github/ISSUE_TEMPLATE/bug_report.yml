name: Bug Report
description: Report a reproducible WaveForward Core problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal commands, files, or repository state needed to reproduce.
      render: bash
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: WaveForward Version
      placeholder: waveforward --version
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Python version, shell
  - type: checkboxes
    id: security
    attributes:
      label: Security Check
      options:
        - label: This report does not contain secrets, tokens, private source code, or credentials.
          required: true
